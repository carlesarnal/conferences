apiVersion: v1
kind: Secret
metadata:
  name: kafka-broker-oauth
  namespace: security-demo
type: Opaque
stringData:
  clientSecret: kafka-broker-secret
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: secured-kafka
  namespace: security-demo
spec:
  kafka:
    version: 3.9.0
    replicas: 1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: oauth
        port: 9093
        type: internal
        tls: true
        authentication:
          type: oauth
          validIssuerUri: http://keycloak:8080/realms/kafka-security
          jwksEndpointUri: http://keycloak:8080/realms/kafka-security/protocol/openid-connect/certs
          userNameClaim: preferred_username
          clientId: kafka-broker
          clientSecret:
            secretName: kafka-broker-oauth
            key: clientSecret
    authorization:
      type: simple
      superUsers:
        - User:service-account-kafka-broker
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
    storage:
      type: ephemeral
  zookeeper:
    replicas: 1
    storage:
      type: ephemeral
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: secured-events
  namespace: security-demo
  labels:
    strimzi.io/cluster: secured-kafka
spec:
  partitions: 3
  replicas: 1
